<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <img src="/assets/Netflix-Logo.png" alt="Logo da Netflix" class="logo">
        <button id="theme-toggle" aria-label="Alternar entre modo claro e modo escuro">Modo Claro</button>
    </nav>
    <main>
        <section class="profiles">
            <h1>Quem está assistindo?</h1>
            <ul class="profiles-list">
                <a href="catalogo/catalogo.html" style="text-decoration: none; color: inherit;">
                <li class="profile">
                    <img src="/assets/perfil-1.jpg" alt="Imagem de um jovem sorrindo e usando um boné preto.">
                    <p>Kaique</p>
                </li>
                </a>
                <a href="catalogo/catalogo.html" style="text-decoration: none; color: inherit;">
                <li class="profile">
                    <img src="/assets/perfil-2.jpg" alt="Imagem de um jovem sorrindo, usando um manto preto e uma luva vermelha.">
                    <p>Otávio</p>
                </li>
                </a>
                <li class="add-profile">
                    <img src="/assets/add.png" alt="Ícone de adição de perfil.">
                    <p>Adicionar Perfil</p>
                </li>
            </ul>
        </section>
        <section class="gerenciar">
            <button type="button" class="manage-button">Gerenciar Perfis</button>
        </section>
    </main>
    <footer>
        <p>© 2026 Netflix. Todos os direitos reservados</p>
        <ul class="github">
            <img src="/assets/github_PNG.png" alt="Ícone do GitHub">
            <p><a href="https://github.com/kaaiquk" target="_blank">kaaiquk</a></p>
        </ul>
    </footer>
    <script src="index.js"></script>
</body>
</html>
